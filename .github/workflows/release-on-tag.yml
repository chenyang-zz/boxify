name: Release On Tag

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Wails v3 CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.71
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install Frontend Dependencies
        run: pnpm -C frontend install --frozen-lockfile

      - name: Generate Wails Bindings
        run: wails3 generate bindings -f '-tags production -trimpath -buildvcs=false -ldflags="-w -s"' -clean=true

      - name: Verification
        run: |
          pnpm -C frontend run build
          go test ./...

      - name: Build Release Artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          wails3 task setup:docker
          wails3 task darwin:build ARCH=amd64 OUTPUT="dist/boxify-${VERSION}-darwin-amd64"
          wails3 task darwin:build ARCH=arm64 OUTPUT="dist/boxify-${VERSION}-darwin-arm64"
          wails3 task linux:build ARCH=amd64 OUTPUT="dist/boxify-${VERSION}-linux-amd64"
          wails3 task linux:build ARCH=arm64 OUTPUT="dist/boxify-${VERSION}-linux-arm64"
          wails3 task windows:build ARCH=amd64 CGO_ENABLED=0
          if [ -f "bin/boxify.exe" ]; then
            mv "bin/boxify.exe" "dist/boxify-${VERSION}-windows-amd64.exe"
          elif [ -f "bin/boxify-windows-amd64.exe" ]; then
            mv "bin/boxify-windows-amd64.exe" "dist/boxify-${VERSION}-windows-amd64.exe"
          else
            echo "未找到 Windows 构建产物（bin/boxify.exe 或 bin/boxify-windows-amd64.exe）"
            exit 1
          fi

      - name: Generate Checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > checksums.txt

      - name: Generate Release Notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          ./scripts/generate-release-notes.sh "$TAG" "常规功能更新与稳定性优化" .release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Boxify ${{ github.ref_name }}
          body_path: .release-notes.md
          files: dist/*
          fail_on_unmatched_files: true
