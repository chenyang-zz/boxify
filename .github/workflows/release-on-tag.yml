name: Release On Tag

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-on-tag-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_NAME: boxify
  NODE_VERSION: '22'
  PNPM_VERSION: '10'
  WAILS_VERSION: v3.0.0-alpha.71

defaults:
  run:
    shell: bash

jobs:
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs_on: ubuntu-latest
            artifact_name: release-linux-amd64
            appimage_suffix: linux-x86_64
            build_deb_rpm: 'true'
          - arch: arm64
            runs_on: ubuntu-24.04-arm
            artifact_name: release-linux-arm64
            appimage_suffix: linux-arm64
            build_deb_rpm: 'false'
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Linux dependencies
        env:
          BUILD_DEB_RPM: ${{ matrix.build_deb_rpm }}
        run: |
          sudo apt-get update
          if [ "${BUILD_DEB_RPM}" = "true" ]; then
            sudo apt-get install -y \
              pkg-config gcc \
              libgtk-3-dev \
              libwebkit2gtk-4.1-dev \
              libsoup-3.0-dev \
              rpm
          else
            sudo apt-get install -y \
              pkg-config gcc \
              libgtk-3-dev \
              libwebkit2gtk-4.1-dev \
              libsoup-3.0-dev
          fi

      - name: Install Wails v3 CLI
        run: |
          CGO_ENABLED=0 go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install Frontend Dependencies
        run: pnpm -C frontend install --frozen-lockfile

      - name: Build Linux artifacts
        env:
          BUILD_ARCH: ${{ matrix.arch }}
          APPIMAGE_SUFFIX: ${{ matrix.appimage_suffix }}
          BUILD_DEB_RPM: ${{ matrix.build_deb_rpm }}
        run: |
          set -euo pipefail
          export CGO_ENABLED=1
          VERSION="${GITHUB_REF_NAME#v}"
          rm -rf dist
          mkdir -p dist

          wails3 task linux:build ARCH="${BUILD_ARCH}" OUTPUT="bin/${APP_NAME}"
          wails3 task linux:create:appimage ARCH="${BUILD_ARCH}"

          APPIMAGE="$(find bin -maxdepth 1 -type f -name '*.AppImage' | head -n1)"
          [ -n "$APPIMAGE" ] && [ -f "$APPIMAGE" ] || (echo "未找到 ${BUILD_ARCH} AppImage 产物" && exit 1)

          cp "$APPIMAGE" "dist/${APP_NAME}-${VERSION}-${APPIMAGE_SUFFIX}.AppImage"

          if [ "${BUILD_DEB_RPM}" = "true" ]; then
            wails3 task linux:create:deb ARCH="${BUILD_ARCH}"
            wails3 task linux:create:rpm ARCH="${BUILD_ARCH}"

            DEB="$(find bin -maxdepth 1 -type f -name '*.deb' | head -n1)"
            RPM="$(find bin -maxdepth 1 -type f -name '*.rpm' | head -n1)"

            [ -n "$DEB" ] && [ -f "$DEB" ] || (echo "未找到 deb 产物" && exit 1)
            [ -n "$RPM" ] && [ -f "$RPM" ] || (echo "未找到 rpm 产物" && exit 1)

            cp "$DEB" "dist/${APP_NAME}_${VERSION}_amd64.deb"
            cp "$RPM" "dist/${APP_NAME}-${VERSION}.x86_64.rpm"
          fi

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error

  build-windows:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            installer_arch_regex: amd64|x64
            output_suffix: win-x64
            build_portable: 'true'
          - arch: arm64
            installer_arch_regex: arm64
            output_suffix: win-arm64
            build_portable: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Windows build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nsis zip \
            pkg-config gcc \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev

      - name: Install Wails v3 CLI
        run: |
          CGO_ENABLED=0 go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install Frontend Dependencies
        run: pnpm -C frontend install --frozen-lockfile

      - name: Build Windows artifacts
        env:
          BUILD_ARCH: ${{ matrix.arch }}
          INSTALLER_ARCH_REGEX: ${{ matrix.installer_arch_regex }}
          OUTPUT_SUFFIX: ${{ matrix.output_suffix }}
          BUILD_PORTABLE: ${{ matrix.build_portable }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          rm -rf dist
          mkdir -p dist

          # 查找 Windows 安装包，兼容大小写和命名差异（如 AMD64/ARM64/x64 等）
          find_installer() {
            local arch_regex="$1"
            find bin -maxdepth 1 -type f -name '*.exe' \
              | grep -Ei "/${APP_NAME}.*(${arch_regex}).*installer\\.exe$" \
              | head -n 1 || true
          }

          wails3 task windows:build ARCH="${BUILD_ARCH}" CGO_ENABLED=0
          wails3 task windows:package ARCH="${BUILD_ARCH}" FORMAT=nsis CGO_ENABLED=0

          WIN_SETUP="$(find_installer "${INSTALLER_ARCH_REGEX}")"
          if [ -z "${WIN_SETUP}" ] && [ -f "bin/${APP_NAME}-installer.exe" ]; then
            WIN_SETUP="bin/${APP_NAME}-installer.exe"
          fi
          if [ -z "${WIN_SETUP}" ]; then
            echo "未找到 Windows ${BUILD_ARCH} 安装包"
            ls -lah bin/*.exe || true
            exit 1
          fi

          cp "$WIN_SETUP" "dist/${APP_NAME}-${VERSION}-${OUTPUT_SUFFIX}-setup.exe"

          if [ "${BUILD_PORTABLE}" = "true" ]; then
            if [ -f "bin/${APP_NAME}.exe" ]; then
              WIN_EXE="bin/${APP_NAME}.exe"
            elif [ -f "bin/${APP_NAME}-windows-amd64.exe" ]; then
              WIN_EXE="bin/${APP_NAME}-windows-amd64.exe"
            else
              echo "未找到 Windows ${BUILD_ARCH} 可执行文件"
              ls -lah bin/*.exe || true
              exit 1
            fi

            cp "$WIN_EXE" "dist/${APP_NAME}.exe"
            (cd dist && zip -9 "${APP_NAME}-${VERSION}-${OUTPUT_SUFFIX}-portable.zip" "${APP_NAME}.exe")
            rm -f "dist/${APP_NAME}.exe"
          fi

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  build-macos:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            wails_task: darwin:package
            dmg_suffix: macos-x64
          - arch: arm64
            wails_task: darwin:package
            dmg_suffix: macos-arm64
          - arch: universal
            wails_task: darwin:package:universal
            dmg_suffix: macos-universal
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Wails v3 CLI
        run: |
          CGO_ENABLED=0 go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install Frontend Dependencies
        run: pnpm -C frontend install --frozen-lockfile

      - name: Build macOS DMG
        env:
          BUILD_ARCH: ${{ matrix.arch }}
          WAILS_TASK: ${{ matrix.wails_task }}
          DMG_SUFFIX: ${{ matrix.dmg_suffix }}
        run: |
          set -euo pipefail
          export CGO_ENABLED=1
          VERSION="${GITHUB_REF_NAME#v}"
          APP_BUNDLE="bin/${APP_NAME}.app"
          DMG_PATH="dist/${APP_NAME}-${VERSION}-${DMG_SUFFIX}.dmg"
          rm -rf dist
          mkdir -p dist

          echo "构建前磁盘空间:"
          df -h

          create_dmg() {
            local app_path="$1"
            local dmg_path="$2"
            hdiutil create -volname "${APP_NAME}" -srcfolder "$app_path" -ov -format UDZO "$dmg_path"
          }

          if [ "$BUILD_ARCH" = "universal" ]; then
            wails3 task "$WAILS_TASK"
          else
            wails3 task "$WAILS_TASK" ARCH="$BUILD_ARCH"
          fi

          [ -d "$APP_BUNDLE" ] || (echo "未找到 ${BUILD_ARCH} app bundle" && exit 1)
          create_dmg "$APP_BUNDLE" "$DMG_PATH"

          echo "构建后磁盘空间:"
          df -h

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  release:
    needs:
      - build-linux
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Verify expected files exist
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          expected=(
            "${APP_NAME}-${VERSION}-win-x64-setup.exe"
            "${APP_NAME}-${VERSION}-win-x64-portable.zip"
            "${APP_NAME}-${VERSION}-win-arm64-setup.exe"
            "${APP_NAME}-${VERSION}-macos-universal.dmg"
            "${APP_NAME}-${VERSION}-macos-arm64.dmg"
            "${APP_NAME}-${VERSION}-macos-x64.dmg"
            "${APP_NAME}-${VERSION}-linux-x86_64.AppImage"
            "${APP_NAME}-${VERSION}-linux-arm64.AppImage"
            "${APP_NAME}_${VERSION}_amd64.deb"
            "${APP_NAME}-${VERSION}.x86_64.rpm"
          )

          for file in "${expected[@]}"; do
            if [ ! -f "dist/${file}"; then
              echo "缺少预期产物: dist/${file}"
              exit 1
            fi
          done

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum * | LC_ALL=C sort > checksums.txt

      - name: Sign checksums
        env:
          GPG_PRIVATE_KEY: ${{ secrets.CHECKSUMS_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.CHECKSUMS_PASSPHRASE }}
        run: |
          set -euo pipefail

          if [ -z "${GPG_PRIVATE_KEY:-}" ] || [ -z "${GPG_PASSPHRASE:-}" ]; then
            echo "缺少签名密钥，请配置 CHECKSUMS_PRIVATE_KEY 与 CHECKSUMS_PASSPHRASE"
            exit 1
          fi

          if printf '%s' "$GPG_PRIVATE_KEY" | grep -q "BEGIN PGP PRIVATE KEY BLOCK"; then
            printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          else
            printf '%s' "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
          fi

          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            --output dist/checksums.txt.sig \
            --detach-sign dist/checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Boxify ${{ github.ref_name }}
          body_path: ./RELEASE_NOTES.md
          files: dist/*
          fail_on_unmatched_files: true
